<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureHire - إدارة الوظائف</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .navbar .nav-link {
      transition: all 0.2s;
    }

    .navbar .nav-link:hover {
      background-color: #f8f9fa;
      color: #0d6efd !important;
    }

    .navbar .nav-link.active {
      background-color: #e7f1ff;
      color: #0d6efd !important;
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="#">
        <i class="bi bi-rocket-takeoff-fill"></i>
        <span>FutureHire <span class="badge bg-light text-primary border fs-6 fw-normal ms-1">شركة</span></span>
      </a>
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
        data-bs-target="#companyNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="companyNavbar">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2 mt-3 mt-lg-0">
          <li class="nav-item"><a class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
              href="dashboard.html"><i class="bi bi-grid-1x2"></i> الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link active rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
              href="manage-jobs.html"><i class="bi bi-briefcase"></i> إدارة الوظائف</a></li>
          <li class="nav-item"><a
              class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 text-secondary fw-semibold"
              href="applications.html"><i class="bi bi-file-earmark-person"></i> طلبات التقديم</a></li>
          <li class="nav-item"><a
              class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 text-secondary fw-semibold"
              href="accepted-list.html"><i class="bi bi-check-circle"></i> المقبولين</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3 border-top pt-3 pt-lg-0 mt-3 mt-lg-0">
          <div class="d-flex align-items-center gap-2 me-2">
            <div id="companyAvatar"
              class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
              style="width: 35px; height: 35px;">C</div>
            <span id="companyName" class="text-dark fw-medium fs-6 d-none d-sm-inline">جاري التحميل...</span>
          </div>
          <button id="logoutBtn"
            class="btn btn-outline-danger btn-sm rounded-2 px-3 d-flex align-items-center gap-2 fw-medium">
            <i class="bi bi-box-arrow-right"></i> تسجيل خروج
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="card border-0 shadow-sm rounded-3 mb-5">
      <div class="card-header bg-white border-0 py-3">
        <h5 class="card-title fw-bold text-dark mb-0"><i class="bi bi-plus-circle-fill text-primary me-2"></i> طرح وظيفة
          جديدة</h5>
      </div>
      <div class="card-body">
        <form id="addJobForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-medium">عنوان الوظيفة</label>
            <input type="text" id="jobTitle" class="form-control" placeholder="مثال: مطور فرونت إند" required>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium">القسم / المجال</label>
            <input type="text" id="jobDepartment" class="form-control" placeholder="مثال: تكنولوجيا المعلومات" required>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium">نوع العمل</label>
            <select id="jobType" class="form-select" required>
              <option value="دوام كامل">دوام كامل</option>
              <option value="دوام جزئي">دوام جزئي</option>
              <option value="عن بعد">عن بعد</option>
              <option value="تدريب">تدريب</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium">الراتب (ج.م)</label>
            <input type="number" id="jobSalary" class="form-control" placeholder="مثال: 8000" required>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium">موقع العمل (المدينة)</label>
            <input type="text" id="jobLocation" class="form-control" placeholder="مثال: بني سويف" required>
          </div>

          <div class="col-12">
            <label class="form-label fw-medium">المهارات المطلوبة (افصل بين كل مهارة بـ فاصلة ,)</label>
            <input type="text" id="jobSkills" class="form-control" placeholder="مثال: React, Node.js, JavaScript, Git"
              required>
          </div>

          <div class="col-12">
            <label class="form-label fw-medium">وصف الوظيفة</label>
            <textarea id="jobDescription" class="form-control" rows="3" placeholder="اكتب تفاصيل ومسؤوليات الوظيفة..."
              required></textarea>
          </div>
          <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary px-4 fw-medium"><i class="bi bi-send-fill me-2"></i> نشر
              الوظيفة</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-header bg-white border-0 py-3">
        <h5 class="card-title fw-bold text-dark mb-0"><i class="bi bi-list-task text-primary me-2"></i> الوظائف الحالية
        </h5>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0 text-center">
            <thead class="table-light">
              <tr>
                <th>المسمى الوظيفي</th>
                <th>القسم</th>
                <th>النوع</th>
                <th>المتقدمين</th>
                <th>حالة النشر</th>
                <th>تاريخ النشر</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="jobsTableBody">
              <tr>
                <td colspan="7" class="py-4 text-muted">جاري تحميل الوظائف...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center py-3">
        <button id="prevBtn" class="btn btn-outline-secondary btn-sm rounded-2 px-3" disabled><i
            class="bi bi-arrow-right me-1"></i> السابق</button>
        <button id="nextBtn" class="btn btn-outline-secondary btn-sm rounded-2 px-3" disabled>التالي <i
            class="bi bi-arrow-left ms-1"></i></button>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editJobModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-light">
          <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i> تعديل بيانات الوظيفة
          </h5>
          <button type="button" class="btn-close m-0" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="editJobForm">
          <div class="modal-body row g-3">
            <input type="hidden" id="editJobId">
            <div class="col-md-6">
              <label class="form-label fw-medium">عنوان الوظيفة</label>
              <input type="text" id="editJobTitle" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">القسم / المجال</label>
              <input type="text" id="editJobDepartment" class="form-control" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-medium">نوع العمل</label>
              <select id="editJobType" class="form-select" required>
                <option value="دوام كامل">دوام كامل</option>
                <option value="دوام جزئي">دوام جزئي</option>
                <option value="عن بعد">عن بعد</option>
                <option value="تدريب">تدريب</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-medium">الراتب (ج.م)</label>
              <input type="number" id="editJobSalary" class="form-control" required>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-medium">موقع العمل</label>
              <input type="text" id="editJobLocation" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-medium">المهارات المطلوبة (افصل بين كل مهارة بـ فاصلة ,)</label>
              <input type="text" id="editJobSkills" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label fw-medium">وصف الوظيفة</label>
              <textarea id="editJobDescription" class="form-control" rows="4" required></textarea>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
            <button type="submit" class="btn btn-success px-4">حفظ التغييرات</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/manage-jobs.js"></script>
</body>

</html>
