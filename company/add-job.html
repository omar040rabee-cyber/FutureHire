<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة وظيفة جديدة - FutureHire</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="dashboard.html">Future<span class="text-white">Hire</span></a>
            <div class="collapse navbar-collapse" id="companyNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link active" href="add-job.html">إضافة وظيفة</a></li>
                    <li class="nav-item"><a class="nav-link" href="manage-jobs.html">إدارة الوظائف</a></li>
                    <li class="nav-item"><a class="nav-link" href="applications.html">طلبات التقديم</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm p-4">
                    <h3 class="fw-bold text-dark mb-4" id="form-title"><i class="fa-solid fa-plus-circle text-primary me-2"></i> طرح وظيفة جديدة في السوق</h3>
                    
                    <div id="job-alert" class="alert d-none" role="alert"></div>

                    <form id="job-form">
                        <input type="hidden" id="job-id"> <div class="mb-3">
                            <label class="form-label fw-bold small">مسمى الوظيفة (Job Title)</label>
                            <input type="text" id="job-title" class="form-control" placeholder="مثال: مهندس ذكاء اصطناعي، مطور فرونت إند" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">مقر العمل / المنطقة</label>
                                <input type="text" id="job-location" class="form-control" placeholder="مثال: القاهرة، عن بُعد" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">نوع العمل</label>
                                <select id="job-type" class="form-select">
                                    <option value="Full-time">دوام كامل (Full-time)</option>
                                    <option value="Part-time">دوام جزئي (Part-time)</option>
                                    <option value="Remote">عن بُعد (Remote)</option>
                                    <option value="Internship">تدريب (Internship)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">المهارات المطلوبة (فصل بينها بفاصلة ,)</label>
                            <input type="text" id="job-skills" class="form-control" placeholder="مثال: JavaScript, Bootstrap, Git, Problem Solving" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">وصف الوظيفة والمتطلبات</label>
                            <textarea id="job-desc" class="form-control" rows="5" placeholder="اكتب تفاصيل الوظيفة هنا..." required></textarea>
                        </div>

                        <div
