<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلبات التقديم الواردة - FutureHire</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .navbar .nav-link { transition: all 0.2s; }
        .navbar .nav-link:hover { background-color: #f8f9fa; color: #0d6efd !important; }
        .navbar .nav-link.active { background-color: #e7f1ff; color: #0d6efd !important; }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="#">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>FutureHire <span class="badge bg-light text-primary border fs-6 fw-normal ms-1">شركة</span></span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#companyNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="companyNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2 mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
                            href="dashboard.html"><i class="bi bi-grid-1x2"></i> الرئيسية</a></li>
                    <li class="nav-item"><a
                            class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
                            href="manage-jobs.html"><i class="bi bi-briefcase"></i> إدارة الوظائف</a></li>
                    <li class="nav-item"><a
                            class="nav-link active rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
                            href="applications.html"><i class="bi bi-file-earmark-person"></i> طلبات التقديم</a></li>
                    <li class="nav-item"><a
                            class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 text-secondary fw-semibold"
                            href="accepted-list.html"><i class="bi bi-check-circle"></i> المقبولين</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3 border-top pt-3 pt-lg-0 mt-3 mt-lg-0">
                    <div class="d-flex align-items-center gap-2 me-2">
                        <div id="companyAvatar"
                            class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
                            style="width: 35px; height: 35px;">C</div>
                        <span id="companyName" class="text-dark fw-medium fs-6 d-none d-sm-inline">جاري
                            التحميل...</span>
                    </div>
                    <button id="logoutBtn"
                        class="btn btn-outline-danger btn-sm rounded-2 px-3 d-flex align-items-center gap-2 fw-medium">
                        <i class="bi bi-box-arrow-right"></i> تسجيل خروج
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="card border-0 shadow-sm p-4">
            <h4 class="fw-bold mb-4"><i class="fa-solid fa-file-signature text-primary me-2"></i> طلبات التوظيف الواردة
                لشركتك</h4>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>اسم المتقدم</th>
                            <th>الوظيفة المطلوبة</th>
                            <th>البريد الإلكتروني</th>
                            <th>رابط LinkedIn</th>
                            <th>السيرة الذاتية (CV)</th>
                            <th>الحالة الحالية</th>
                            <th class="text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="applications-table">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">جاري تحميل طلبات التقديم...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav class="d-flex justify-content-between align-items-center mt-4">
                <button class="btn btn-outline-secondary btn-sm fw-bold" id="app-prev-btn" disabled>السابق</button>
                <span class="text-muted small" id="app-page-info">الصفحة 1</span>
                <button class="btn btn-outline-secondary btn-sm fw-bold" id="app-next-btn" disabled>التالي</button>
            </nav>
        </div>
    </div>

    <script type="module" src="js/applications-manager.js"></script>
</body>

</html>
