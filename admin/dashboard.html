<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الأدمن - FutureHire</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="#">
        <i class="bi bi-rocket-takeoff-fill"></i>
        <span>FutureHire <span class="badge bg-light text-primary border fs-6 fw-normal ms-1">الأدمن</span></span>
      </a>

      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
        data-bs-target="#adminNavbar" aria-controls="adminNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="adminNavbar">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2 mt-3 mt-lg-0">
          <li class="nav-item">
            <a class="nav-link active rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold" href="dashboard.html">
              <i class="bi bi-speedometer2"></i> الرئيسية
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 text-secondary fw-semibold"
              href="manage-companies.html">
              <i class="bi bi-building"></i> إدارة الشركات
            </a>
          </li>
        </ul>

        <div class="d-flex align-items-center gap-3 border-top pt-3 pt-lg-0 border-lg-0 mt-3 mt-lg-0">
          <div class="d-flex align-items-center gap-2 me-2">
            <div id="adminAvatar"
              class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
              style="width: 35px; height: 35px;">A</div>
            <span id="adminName" class="text-dark fw-medium fs-6 d-none d-sm-inline">جاري التحميل...</span>
          </div>
          <button id="logoutBtn"
            class="btn btn-outline-danger btn-sm rounded-2 px-3 d-flex align-items-center gap-2 fw-medium">
            <i class="bi bi-box-arrow-right"></i> تسجيل خروج
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="mb-4">إحصائيات المنصة</h2>
    <div id="alertContainer"></div>

    <div class="row g-4 mb-5">
      <div class="col-md-3">
        <div class="card bg-primary text-white h-100">
          <div class="card-body">
            <h5 class="card-title">إجمالي الشركات</h5>
            <h3 id="totalCompanies">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-success text-white h-100">
          <div class="card-body">
            <h5 class="card-title">اشتراكات سارية</h5>
            <h3 id="activeSubs">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-danger text-white h-100">
          <div class="card-body">
            <h5 class="card-title">اشتراكات منتهية</h5>
            <h3 id="expiredSubs">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-warning text-dark h-100">
          <div class="card-body">
            <h5 class="card-title">إجمالي الأرباح</h5>
            <h3 id="totalRevenue">0 ج.م</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">حالة اشتراكات الشركات</div>
          <div class="card-body">
            <canvas id="subscriptionPieChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
