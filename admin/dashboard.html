<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم الأدمن - FutureHire</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">FutureHire - الأدمن</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="manage-companies.html">إدارة الشركات</a></li>
        </ul>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm">تسجيل خروج</button>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h2 class="mb-4">إحصائيات المنصة</h2>
    <div id="alertContainer"></div>

    <div class="row g-4 mb-5">
      <div class="col-md-3">
        <div class="card bg-primary text-white h-100">
          <div class="card-body">
            <h5 class="card-title">إجمالي الشركات</h5>
            <h3 id="totalCompanies">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-success text-white h-100">
          <div class="card-body">
            <h5 class="card-title">اشتراكات سارية</h5>
            <h3 id="activeSubs">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-danger text-white h-100">
          <div class="card-body">
            <h5 class="card-title">اشتراكات منتهية</h5>
            <h3 id="expiredSubs">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-warning text-dark h-100">
          <div class="card-body">
            <h5 class="card-title">إجمالي الأرباح</h5>
            <h3 id="totalRevenue">0 ج.م</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">حالة اشتراكات الشركات</div>
          <div class="card-body">
            <canvas id="subscriptionPieChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
