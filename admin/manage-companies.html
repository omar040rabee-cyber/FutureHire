<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الشركات - FutureHire</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="#">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>FutureHire <span
                        class="badge bg-light text-primary border fs-6 fw-normal ms-1">الأدمن</span></span>
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#adminNavbar" aria-controls="adminNavbar" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2 mt-3 mt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
                            href="dashboard.html">
                            <i class="bi bi-speedometer2"></i> الرئيسية
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active rounded-3 px-3 d-flex align-items-center gap-2 text-secondary fw-semibold"
                            href="manage-companies.html">
                            <i class="bi bi-building"></i> إدارة الشركات
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3 border-top pt-3 pt-lg-0 border-lg-0 mt-3 mt-lg-0">
                    <div class="d-flex align-items-center gap-2 me-2">
                        <div id="adminAvatar"
                            class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
                            style="width: 35px; height: 35px;">A</div>
                        <span id="adminName" class="text-dark fw-medium fs-6 d-none d-sm-inline">جاري التحميل...</span>
                    </div>
                    <button id="logoutBtn"
                        class="btn btn-outline-danger btn-sm rounded-2 px-3 d-flex align-items-center gap-2 fw-medium">
                        <i class="bi bi-box-arrow-right"></i> تسجيل خروج
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">

        <div class="card mb-5">
            <div class="card-header bg-primary text-white">إضافة حساب شركة جديد</div>
            <div class="card-body">
                <form id="addCompanyForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">اسم الشركة</label>
                            <input type="text" class="form-control" id="companyName" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="companyEmail" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control" id="companyPassword" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">سعر الاشتراك/شهر (ج.م)</label>
                            <input type="number" class="form-control" id="subPrice" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">مدة الاشتراك (بالأشهر)</label>
                            <input type="number" class="form-control" id="subDuration" value="12" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-success">إضافة الشركة</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">قائمة الشركات المسجلة</div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>اسم الشركة</th>
                                <th>البريد الإلكتروني</th>
                                <th>اجمالى الاشتراك (ج.م)</th>
                                <th>تاريخ الانتهاء</th>
                                <th>الحالة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="companiesTableBody">
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <button id="prevBtn" class="btn btn-outline-secondary" disabled>السابق</button>
                    <button id="nextBtn" class="btn btn-outline-secondary">التالي</button>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" id="editCompanyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">تعديل بيانات الشركة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editCompanyForm">
                        <input type="hidden" id="editCompanyId">
                        <div class="mb-3">
                            <label class="form-label">اسم الشركة</label>
                            <input type="text" class="form-control" id="editCompanyName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="editCompanyEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">سعر الاشتراك/شهر (ج.م)</label>
                            <input type="number" class="form-control" id="editSubPrice" required>
                        </div>
                        <button type="submit" class="btn btn-success">حفظ التعديلات</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/manage-companies.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
