<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureHire - ملفي الشخصي وطلباتي</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .navbar .nav-link {
            transition: all 0.2s;
        }

        .navbar .nav-link:hover {
            background-color: #f8f9fa;
            color: #0d6efd !important;
        }

        .navbar .nav-link.active {
            background-color: #e7f1ff;
            color: #0d6efd !important;
        }

        .job-hero {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
            padding: 60px 0;
        }

        .pagination .page-item button {
            border: none;
            margin: 0 4px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="#">
                <i class="bi bi-rocket-takeoff-fill"></i>
                <span>FutureHire <span class="badge bg-light text-primary border fs-6 fw-normal ms-1">باحث عن
                        عمل</span></span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#userNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="userNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2 mt-3 mt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
                            href="explore.html">
                            <i class="bi bi-compass"></i> تصفح الوظائف
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active rounded-3 px-3 d-flex align-items-center gap-2 fw-semibold"
                            href="profile.html">
                            <i class="bi bi-person-bounding-box"></i> حسابي وطلباتي
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3 border-top pt-3 pt-lg-0 mt-3 mt-lg-0">
                    <button id="logoutBtn"
                        class="btn btn-outline-danger btn-sm rounded-2 px-3 d-flex align-items-center gap-2 fw-medium">
                        <i class="bi bi-box-arrow-right"></i> تسجيل خروج
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">

            <div class="col-lg-4">
                <div class="card profile-card shadow-sm p-4">
                    <div class="text-center mb-4">
                        <div class="bg-light d-inline-block rounded-circle p-3 mb-3 border">
                            <i class="bi bi-person-gear text-primary display-4"></i>
                        </div>
                        <h5 class="fw-bold text-dark m-0">إعدادات الحساب</h5>
                        <p class="text-muted small">تحديث بياناتك الشخصية</p>
                    </div>

                    <form id="profileForm">
                        <div class="mb-3">
                            <label for="userName" class="form-label small fw-bold text-secondary">الاسم بالكامل</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-start-0 text-muted"><i
                                        class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="userName" placeholder="أدخل اسمك بالكامل"
                                    required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="userEmail" class="form-label small fw-bold text-secondary">البريد
                                الإلكتروني</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-start-0 text-muted"><i
                                        class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control bg-light" id="userEmail" readonly disabled>
                            </div>
                            <div class="form-text text-muted" style="font-size: 0.75rem;">لا يمكن تعديل البريد
                                الإلكتروني المسجل.</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 rounded-3 fw-bold py-2">
                            <i class="bi bi-check-circle me-1"></i> حفظ التغييرات
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card table-card shadow-sm p-4 h-100">
                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-file-earmark-person text-primary fs-3 me-2"></i>
                        <div>
                            <h5 class="fw-bold text-dark m-0">طلبات التوظيف الخاصة بي</h5>
                            <p class="text-muted small m-0">تابع حالة الوظائف التي تقدمت إليها</p>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" style="width: 8%">#</th>
                                    <th scope="col" style="width: 32%">المسمى الوظيفي</th>
                                    <th scope="col" style="width: 25%">الشركة</th>
                                    <th scope="col" style="width: 18%">تاريخ التقديم</th>
                                    <th scope="col" style="width: 17%">حالة الطلب</th>
                                </tr>
                            </thead>

                            <tbody id="myApplicationsTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="js/profile.js"></script>
</body>

</html>
